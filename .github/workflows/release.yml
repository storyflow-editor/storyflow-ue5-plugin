name: Release

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          echo "version=$version" >> $env:GITHUB_OUTPUT

      - name: Build plugin for all UE versions
        shell: cmd
        run: |
          set PLUGIN=%GITHUB_WORKSPACE%\StoryFlowPlugin.uplugin
          set OUTPUT=%GITHUB_WORKSPACE%\BuildOutput
          set ENGINES=C:\Program Files\Epic Games

          for %%V in (5.3 5.4 5.5 5.6 5.7) do (
            echo Building for UE %%V...
            if exist "%OUTPUT%\StoryFlowPlugin_%%V" rmdir /s /q "%OUTPUT%\StoryFlowPlugin_%%V"
            call "%ENGINES%\UE_%%V\Engine\Build\BatchFiles\RunUAT.bat" BuildPlugin -Plugin="%PLUGIN%" -Package="%OUTPUT%\StoryFlowPlugin_%%V" -TargetPlatforms=Win64 -Rocket
            if errorlevel 1 (
              echo [FAILED] UE %%V build failed!
              exit /b 1
            )
            echo [OK] UE %%V build succeeded.
          )

      - name: Zip builds
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          foreach ($ue in @("5.3", "5.4", "5.5", "5.6", "5.7")) {
            $src = "BuildOutput\StoryFlowPlugin_$ue\StoryFlowPlugin"
            $zip = "StoryFlow-Plugin-v$version-UE$ue.zip"
            if (Test-Path $src) {
              Compress-Archive -Path $src -DestinationPath $zip -Force
              Write-Host "Created $zip"
            } else {
              Write-Host "WARNING: $src not found, skipping"
            }
          }

      - name: Upload to R2
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          foreach ($ue in @("5.3", "5.4", "5.5", "5.6", "5.7")) {
            $zip = "StoryFlow-Plugin-v$version-UE$ue.zip"
            aws s3 cp $zip "s3://${{ secrets.R2_BUCKET_NAME }}/ue5/$version/$zip" --endpoint-url "https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com"
          }
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

      - name: Attach to GitHub Release
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          foreach ($ue in @("5.3", "5.4", "5.5", "5.6", "5.7")) {
            gh release upload ${{ github.ref_name }} "StoryFlow-Plugin-v$version-UE$ue.zip" --clobber
          }
        env:
          GH_TOKEN: ${{ github.token }}

  changelog:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Open changelog PR on storyflow-web
        run: |
          CHANGELOG_FILE="changelogs/v${{ steps.version.outputs.version }}.md"
          if [ ! -f "$CHANGELOG_FILE" ]; then
            echo "No changelog file found at $CHANGELOG_FILE, skipping"
            exit 0
          fi

          VERSION=${{ steps.version.outputs.version }}
          BRANCH="changelog/unreal-v${VERSION}"
          DEST_PATH="src/content/changelog-unreal/v${VERSION}.md"

          cd /tmp
          git clone --depth 1 --branch live \
            https://x-access-token:${{ secrets.WEB_REPO_PAT }}@github.com/storyflow-editor/storyflow-web.git
          cd storyflow-web

          git push origin --delete "$BRANCH" 2>/dev/null || true
          git checkout -b "$BRANCH"
          cp $GITHUB_WORKSPACE/$CHANGELOG_FILE $DEST_PATH
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add $DEST_PATH
          git commit -m "Add changelog: Unreal v${VERSION}"
          git push -u origin "$BRANCH"

          gh pr create \
            --repo storyflow-editor/storyflow-web \
            --base live \
            --head "$BRANCH" \
            --title "Add changelog: Unreal v${VERSION}" \
            --body "Auto-generated from Unreal plugin release v${VERSION}. Merge to deploy."
        env:
          GH_TOKEN: ${{ secrets.WEB_REPO_PAT }}

  bump-version:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Bump version
        run: |
          CURRENT=$(node -p "JSON.parse(require('fs').readFileSync('StoryFlowPlugin.uplugin','utf8')).VersionName")
          IFS='.' read -r major minor patch <<< "$CURRENT"
          NEW="$major.$minor.$((patch + 1))"
          echo "$NEW" | node update-version.js

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Bump version to $(node -p "JSON.parse(require('fs').readFileSync('StoryFlowPlugin.uplugin','utf8')).VersionName")"
          git push
