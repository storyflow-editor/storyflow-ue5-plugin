name: Release

on:
  release:
    types: [published]

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Zip plugin source
        run: |
          # Create a StoryFlowPlugin/ root folder so users can drop it directly into Plugins/
          mkdir -p _pkg/StoryFlowPlugin
          cp -r Config Content Resources Source StoryFlowPlugin.uplugin README.md LICENSE _pkg/StoryFlowPlugin/ 2>/dev/null || true
          cd _pkg
          zip -r ../StoryFlow-Plugin-Source.zip StoryFlowPlugin/

      - name: Create per-UE-version zips
        run: |
          VERSION=${{ steps.version.outputs.version }}
          for UE in 5.3 5.4 5.5 5.6 5.7; do
            cp StoryFlow-Plugin-Source.zip "StoryFlow-Plugin-v${VERSION}-UE${UE}.zip"
          done

      - name: Upload to R2
        run: |
          VERSION=${{ steps.version.outputs.version }}
          for UE in 5.3 5.4 5.5 5.6 5.7; do
            aws s3 cp \
              "StoryFlow-Plugin-v${VERSION}-UE${UE}.zip" \
              "s3://${{ secrets.R2_BUCKET_NAME }}/ue5/StoryFlow-Plugin-v${VERSION}-UE${UE}.zip" \
              --endpoint-url https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com
          done
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

      - name: Attach to GitHub Release
        run: |
          VERSION=${{ steps.version.outputs.version }}
          for UE in 5.3 5.4 5.5 5.6 5.7; do
            gh release upload ${{ github.ref_name }} "StoryFlow-Plugin-v${VERSION}-UE${UE}.zip" --clobber
          done
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Open changelog PR on storyflow-web
        run: |
          CHANGELOG_FILE="changelogs/v${{ steps.version.outputs.version }}.md"
          if [ ! -f "$CHANGELOG_FILE" ]; then
            echo "No changelog file found at $CHANGELOG_FILE, skipping"
            exit 0
          fi

          VERSION=${{ steps.version.outputs.version }}
          BRANCH="changelog/unreal-v${VERSION}"
          DEST_PATH="src/content/changelog-unreal/v${VERSION}.md"

          cd /tmp
          git clone --depth 1 --branch live \
            https://x-access-token:${{ secrets.WEB_REPO_PAT }}@github.com/storyflow-editor/storyflow-web.git
          cd storyflow-web

          git push origin --delete "$BRANCH" 2>/dev/null || true
          git checkout -b "$BRANCH"
          cp $GITHUB_WORKSPACE/$CHANGELOG_FILE $DEST_PATH
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add $DEST_PATH
          git commit -m "Add changelog: Unreal v${VERSION}"
          git push -u origin "$BRANCH"

          gh pr create \
            --repo storyflow-editor/storyflow-web \
            --base live \
            --head "$BRANCH" \
            --title "Add changelog: Unreal v${VERSION}" \
            --body "Auto-generated from Unreal plugin release v${VERSION}. Merge to deploy."
        env:
          GH_TOKEN: ${{ secrets.WEB_REPO_PAT }}

  bump-version:
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Bump version
        run: |
          CURRENT=$(node -p "JSON.parse(require('fs').readFileSync('StoryFlowPlugin.uplugin','utf8')).VersionName")
          IFS='.' read -r major minor patch <<< "$CURRENT"
          NEW="$major.$minor.$((patch + 1))"
          echo "$NEW" | node update-version.js

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Bump version to $(node -p "JSON.parse(require('fs').readFileSync('StoryFlowPlugin.uplugin','utf8')).VersionName")"
          git push
